<!DOCTYPE html>
<html>
<head>
<title>Deposit Money</title>

<style>
body{
    background: linear-gradient(135deg,#141e30,#243b55);
    font-family:Arial;
    color:white;
    text-align:center;
    padding:50px;
}

.form-box{
    background: rgba(255,255,255,0.08);
    padding:30px;
    border-radius:15px;
    display:inline-block;
}

input{
    padding:10px;
    margin:10px;
    border:none;
    border-radius:8px;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:10px;
    background:#00c6ff;
    cursor:pointer;
}
</style>

</head>
<body>

<h2>💰 Deposit Money</h2>

<div class="form-box">
<form method="POST">

    <input type="text" name="acc_no" placeholder="Account Number" required><br>

    <input type="number" name="amount" placeholder="Amount" required><br>

    <button type="submit">Deposit</button>

</form>
</div>

</body>
</html>
