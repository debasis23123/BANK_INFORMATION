<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Debasis Bank Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
    background: linear-gradient(135deg,#141e30,#243b55);
    color:white;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 40px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
}

.header h1{
    color:#00eaff;
}

.logout{
    padding:8px 15px;
    background:red;
    border:none;
    color:white;
    border-radius:10px;
    cursor:pointer;
}

.container{
    padding:40px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:25px;
}

.card{
    background: rgba(255,255,255,0.08);
    padding:25px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-10px) scale(1.03);
    background: linear-gradient(45deg,#00c6ff,#0072ff);
}

.card h3{
    margin-bottom:10px;
}

.card button{
    margin-top:10px;
    padding:10px;
    border:none;
    border-radius:10px;
    background:black;
    color:white;
    cursor:pointer;
}

.welcome{
    margin-bottom:30px;
    font-size:22px;
}
</style>
</head>
<body>

<div class="header">
    <h1>🏦 Debasis Bank</h1>
    <button class="logout" onclick="location.href='/'">Logout</button>
</div>

<div class="container">
    <div class="welcome">Welcome to Your Dashboard 👋</div>

    <div class="cards">

        <div class="card">
            <h3>➕ Create Account</h3>
            <button onclick="location.href='/create'">Open</button>
        </div>

        <div class="card">
            <h3>💰 Deposit Money</h3>
            <button onclick="location.href='/deposit'">Open</button>
        </div>

        <div class="card">
            <h3>💸 Withdraw</h3>
            <button onclick="location.href='/withdraw'">Open</button>
        </div>

        <div class="card">
            <h3>📊 Check Balance</h3>
            <button onclick="location.href='/balance'">Open</button>
              </div>

    </div>
</div>

</body>
</html>
